version: '3.8'

# Ports werden zentral über die Root-.env gesteuert (docker compose liest .env
# im selben Verzeichnis automatisch). Die ${VAR:-default}-Schreibweise stellt
# sinnvolle Defaults sicher, falls keine .env vorhanden ist.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-4001}:${BACKEND_PORT:-4001}"
    environment:
      - NODE_ENV=development
      - BACKEND_PORT=${BACKEND_PORT:-4001}
      - DATABASE_PATH=/data/descos.db
      - LOG_LEVEL=debug
      # Ziel fuer den /api/oszi/* Proxy (Oszi-Service)
      - OSZI_URL=http://oszi:${OSZI_PORT:-4002}
    volumes:
      - ./data:/data
    depends_on:
      - oszi
    restart: unless-stopped

  oszi:
    build:
      context: .
      dockerfile: Dockerfile.oszi
    ports:
      - "${OSZI_PORT:-4002}:${OSZI_PORT:-4002}"
    environment:
      - OSZI_PORT=${OSZI_PORT:-4002}
      # IP des Rigol-Oszilloskops (LAN/VISA). Fuer Test ohne Hardware: OSZI_DEMO=1
      - RIGOL_IP=192.168.1.45
      # - OSZI_DEMO=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Backend-Port wird beim Build ins Client-Bundle eingebacken.
        - NEXT_PUBLIC_BACKEND_PORT=${BACKEND_PORT:-4001}
    ports:
      - "${FRONTEND_PORT:-4000}:${FRONTEND_PORT:-4000}"
    environment:
      - PORT=${FRONTEND_PORT:-4000}
    depends_on:
      - backend
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:latest
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "9001:9001"
    volumes:
      - ./mqtt-config:/mosquitto/config
      - ./mqtt-data:/mosquitto/data
    restart: unless-stopped
