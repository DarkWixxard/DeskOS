version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/data/descos.db
      - LOG_LEVEL=debug
      # Ziel fuer den /api/oszi/* Proxy (Oszi-Service)
      - OSZI_URL=http://oszi:5000
    volumes:
      - ./data:/data
    depends_on:
      - oszi
    restart: unless-stopped

  oszi:
    build:
      context: .
      dockerfile: Dockerfile.oszi
    ports:
      - "5000:5000"
    environment:
      # IP des Rigol-Oszilloskops (LAN/VISA). Fuer Test ohne Hardware: OSZI_DEMO=1
      - RIGOL_IP=192.168.1.45
      # - OSZI_DEMO=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt-config:/mosquitto/config
      - ./mqtt-data:/mosquitto/data
    restart: unless-stopped
